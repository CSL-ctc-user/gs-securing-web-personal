name: '✅ Gemini Plan Execute'

on:
  workflow_call:
    inputs:
      additional_context:
        required: false
        type: string
      issue_number:
        required: true
        type: string

defaults:
  run:
    shell: bash

jobs:
  plan-execute:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- TODO: ここでGemini plan/execute を実行して返信文を生成 ---
      - name: Placeholder (plan-execute)
        run: |
          echo "TODO: run Gemini plan/execute here"
          echo "REPLY=Gemini plan-execute placeholder: ${{ inputs.additional_context }}" >> $GITHUB_ENV

      - name: Post plan/execute comment (PAT)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_ACTIONS }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          REPOSITORY: ${{ github.repository }}
          BODY: ${{ env.REPLY }}
        run: |
          gh issue comment "${ISSUE_NUMBER}" \
            --body "${BODY}" \
            --repo "${REPOSITORY}"
