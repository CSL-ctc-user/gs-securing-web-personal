name: Create NHI token test issue

on:
  workflow_dispatch:

jobs:
  create_issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create issue via GitHub REST API using NHI_TEST_TOKEN
        run: |
          curl --request POST \
            --url "https://api.github.com/repos/${{ github.repository }}/issues" \
            --header "authorization: Bearer ${{ secrets.NHI_TEST_TOKEN }}" \
            --header "content-type: application/json" \
            --data "{\"title\":\"NHI token test\",\"body\":\"Created by workflow\"}" \
            --fail
