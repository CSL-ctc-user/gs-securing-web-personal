name: '🔀 Gemini Triage'

on:
  workflow_call:
    inputs:
      additional_context:
        type: string
        description: 'Any additional context from the request'
        required: false
      issue_number:
        type: string
        description: 'Issue or PR number to triage'
        required: true

concurrency:
  group: ${{ github.workflow }}-triage-${{ github.event_name }}-${{ inputs.issue_number }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    outputs:
      available_labels: ${{ steps.get_labels.outputs.available_labels }}
      selected_labels: ${{ steps.gemini_analysis.outputs.selected_labels || '' }}
    permissions:
      contents: read
      id-token: write
      issues: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get repository labels
        id: get_labels
        uses: actions/github-script@v8
        with:
          script: |
            const labels = [];
            for await (const response of github.paginate.iterator(
              github.rest.issues.listLabelsForRepo,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
            )) {
              labels.push(...response.data);
            }

            if (!labels || labels.length === 0) {
              core.setFailed('There are no issue labels in this repository.');
              return;
            }

            const labelNames = labels.map(label => label.name).sort();
            core.setOutput('available_labels', labelNames.join(','));
            core.info(`Found ${labelNames.length} labels: ${labelNames.join(', ')}`);

      # reusable workflow では github.event.issue が無い/薄い場合があるので、PATで取りに行く
      - name: Fetch issue data (PAT)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_ACTIONS }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Issue も PR も /issues/{number} で取得可能（PRの場合は pull_request フィールドが付く）
          json="$(gh api "repos/${REPO}/issues/${ISSUE_NUMBER}")"

          title="$(echo "$json" | jq -r '.title // ""')"
          body="$(echo "$json" | jq -r '.body // ""')"

          {
            echo "ISSUE_TITLE<<EOF"
            echo "$title"
            echo "EOF"
            echo "ISSUE_BODY<<EOF"
            echo "$body"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Run Gemini issue analysis
        id: gemini_analysis
        if: ${{ steps.get_labels.outputs.available_labels != '' }}
        uses: google-github-actions/run-gemini-cli@v0
        env:
          # Do NOT pass any auth tokens here since this runs on untrusted inputs
          GITHUB_TOKEN: ''
          ISSUE_TITLE: ${{ env.ISSUE_TITLE }}
          ISSUE_BODY: ${{ env.ISSUE_BODY }}
          AVAILABLE_LABELS: ${{ steps.get_labels.outputs.available_labels }}
        with:
          gcp_location: ${{ vars.GOOGLE_CLOUD_LOCATION }}
          gcp_project_id: ${{ vars.GOOGLE_CLOUD_PROJECT }}
          gcp_service_account: ${{ vars.SERVICE_ACCOUNT_EMAIL }}
          gcp_workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_cli_version: ${{ vars.GEMINI_CLI_VERSION }}
          gemini_debug: ${{ fromJSON(vars.GEMINI_DEBUG || vars.ACTIONS_STEP_DEBUG || 'false') }}
          gemini_model: ${{ vars.GEMINI_MODEL }}
          google_api_key: ${{ secrets.GOOGLE_API_KEY }}
          use_gemini_code_assist: ${{ vars.GOOGLE_GENAI_USE_GCA }}
          use_vertex_ai: ${{ vars.GOOGLE_GENAI_USE_VERTEXAI }}
          upload_artifacts: ${{ vars.UPLOAD_ARTIFACTS }}
          workflow_name: 'gemini-triage'
          settings: |
            {
              "model": { "maxSessionTurns": 25 },
              "telemetry": { "enabled": true, "target": "local", "outfile": ".gemini/telemetry.log" },
              "tools": { "core": ["run_shell_command(echo)"] }
            }
          prompt: '/gemini-triage'

          # 重要：run-gemini-cli が selected_labels を出力しない実装もあるので
          # ここでは "selected_labels" output がある前提で扱う（無ければ空のまま）

  label:
    runs-on: ubuntu-latest
    needs: triage
    if: ${{ needs.triage.outputs.selected_labels != '' }}
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Apply labels (PAT)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_ACTIONS }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          AVAILABLE_LABELS: ${{ needs.triage.outputs.available_labels }}
          SELECTED_LABELS: ${{ needs.triage.outputs.selected_labels }}
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GH_PAT_ACTIONS }}
          script: |
            const availableLabels = (process.env.AVAILABLE_LABELS || '')
              .split(',')
              .map(l => l.trim())
              .filter(Boolean)
              .sort();

            const selectedLabels = (process.env.SELECTED_LABELS || '')
              .split(',')
              .map(l => l.trim())
              .filter(l => availableLabels.includes(l))
              .sort();

            const issueNumber = Number(process.env.ISSUE_NUMBER);

            if (selectedLabels && selectedLabels.length > 0) {
              await github.rest.issues.setLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: selectedLabels,
              });
              core.info(`Successfully set labels: ${selectedLabels.join(', ')}`);
            } else {
              core.info('No valid labels selected.');
            }
