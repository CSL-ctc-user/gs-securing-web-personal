name: '🏷️ Gemini Triage'

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: string
      additional_context:
        required: false
        type: string

defaults:
  run:
    shell: bash

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Prepare dirs
        run: mkdir -p "$RUNNER_TEMP/gemini"

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Build context file
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_ACTIONS }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          set -euo pipefail
          CONTEXT_FILE="$RUNNER_TEMP/gemini/context.txt"
          issue="$(gh api "repos/${REPO}/issues/${ISSUE_NUMBER}")"
          title="$(echo "$issue" | jq -r '.title // ""')"
          body="$(echo "$issue" | jq -r '.body // ""')"
          url="$(echo "$issue" | jq -r '.html_url // ""')"
          {
            echo "Issue: #${ISSUE_NUMBER}"
            echo "Title: ${title}"
            echo "URL: ${url}"
            echo ""
            echo "Additional context:"
            echo "${{ inputs.additional_context }}"
            echo ""
            echo "Body:"
            echo "${body}"
          } > "$CONTEXT_FILE"
          echo "CONTEXT_FILE=$CONTEXT_FILE" >> "$GITHUB_ENV"

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli@latest

      - name: Run Gemini (Flash)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          OUT="$RUNNER_TEMP/gemini/out.txt"
          set +e
          printf "%s\n" \
            "Perform issue triage." \
            "Suggest labels, priority, next actions." \
            "" "CONTEXT:" \
            | cat - "$CONTEXT_FILE" \
            | gemini --model gemini-1.5-flash --prompt - >"$OUT" 2>/dev/null
          rc=$?
          set -e
          echo "RC=$rc" >> "$GITHUB_ENV"
          echo "OUT=$OUT" >> "$GITHUB_ENV"

      - name: Post comment
        if: ${{ env.RC == '0' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_ACTIONS }}
        run: |
          gh issue comment "${{ inputs.issue_number }}" --body-file "$OUT" --repo "${{ github.repository }}"
