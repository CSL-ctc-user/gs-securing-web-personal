name: '🏷️ Gemini Triage'

on:
  issues:
    types: [opened]

concurrency:
  group: gemini-triage-${{ github.event.issue.number }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Prepare dirs
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.gemini" "$RUNNER_TEMP/gemini"

      - name: Install deps (jq)
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Install Gemini CLI
        run: |
          set -euo pipefail
          npm install -g @google/gemini-cli@latest
          gemini --version

      - name: Build triage context
        run: |
          set -euo pipefail

          DELIM="CTX_$(date +%s%N)_$RANDOM"

          {
            echo "CONTEXT<<${DELIM}"
            echo "Issue: #${{ github.event.issue.number }}"
            echo "Title: ${{ github.event.issue.title }}"
            echo "URL: ${{ github.event.issue.html_url }}"
            echo ""
            echo "Body:"
            echo "${{ github.event.issue.body }}"
            echo ""
            echo "Task:"
            echo "- Propose labels"
            echo "- Suggest priority"
            echo "- Suggest next actions"
            echo "${DELIM}"
          } >> "$GITHUB_ENV"

      - name: Run Gemini CLI (Flash fixed)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail

          OUT_FILE="$RUNNER_TEMP/gemini/out.txt"
          ERR_FILE="$RUNNER_TEMP/gemini/err.txt"

          set +e
          printf "CONTEXT:\n%s\n" "${CONTEXT}" \
            | gemini --model gemini-1.5-flash --prompt - \
              >"$OUT_FILE" 2>"$ERR_FILE"
          rc=$?
          set -e

          echo "RC=$rc" >> "$GITHUB_ENV"
          echo "OUT_FILE=$OUT_FILE" >> "$GITHUB_ENV"

      - name: Post triage comment
        if: ${{ env.RC == '0' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_ACTIONS }}
        run: |
          set -euo pipefail

          gh issue comment "${{ github.event.issue.number }}" \
            --body-file "$OUT_FILE" \
            --repo "${{ github.repository }}"
