name: Gemini Dispatch (Receiver)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "実行モード（review/triage など）"
        required: true
        type: string
      target:
        description: "対象（PR番号やIssue番号など）"
        required: false
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Show inputs
        run: |
          echo "mode=${{ inputs.mode }}"
          echo "target=${{ inputs.target }}"
