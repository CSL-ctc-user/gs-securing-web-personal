name: '🔀 Gemini Dispatch'

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

defaults:
  run:
    shell: bash

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      pull-requests: read
    outputs:
      command: ${{ steps.decide.outputs.command }}
      issue_number: ${{ steps.decide.outputs.issue_number }}
      additional_context: ${{ steps.decide.outputs.additional_context }}
    steps:
      - id: decide
        run: |
          set -euo pipefail
          # シンプルな分岐例。必要に応じて拡張してください。
          echo "command=review" >> "$GITHUB_OUTPUT"
          echo "issue_number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          echo "additional_context=" >> "$GITHUB_OUTPUT"

  review:
    needs: dispatch
    if: ${{ needs.dispatch.outputs.command == 'review' }}
    uses: ./.github/workflows/gemini-review.yml
    with:
      issue_number: ${{ needs.dispatch.outputs.issue_number }}
      additional_context: ${{ needs.dispatch.outputs.additional_context }}
    secrets: inherit

  triage:
    needs: dispatch
    if: ${{ needs.dispatch.outputs.command == 'triage' }}
    uses: ./.github/workflows/gemini-triage.yml
    with:
      issue_number: ${{ needs.dispatch.outputs.issue_number }}
      additional_context: ${{ needs.dispatch.outputs.additional_context }}
    secrets: inherit

  invoke:
    needs: dispatch
    if: ${{ needs.dispatch.outputs.command == 'invoke' }}
    uses: ./.github/workflows/gemini-invoke.yml
    with:
      issue_number: ${{ needs.dispatch.outputs.issue_number }}
      additional_context: ${{ needs.dispatch.outputs.additional_context }}
    secrets: inherit

