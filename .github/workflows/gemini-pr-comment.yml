name: Gemini PR Comment

on:
  pull_request:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  gemini:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show trigger context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "actor=${{ github.actor }}"
          echo "repository=${{ github.repository }}"

      - name: Show PR info (if pull_request)
        if: github.event_name == 'pull_request'
        run: |
          echo "PR number=${{ github.event.pull_request.number }}"
          echo "PR title=${{ github.event.pull_request.title }}"
          echo "PR author=${{ github.event.pull_request.user.login }}"

      # --- ここは本来: Gemini API を呼んで result.json を作る場所 ---
      # いまは result.json が既にある/作っている前提なので placeholder のまま
      - name: Placeholder for Gemini processing
        run: |
          echo "Here we will call Gemini API later"
          # 例: ここで result.json を生成する処理を入れる

      # ✅ result.json から本文を抽出して環境変数に入れる（次stepで使う）
      - name: Extract BODY from result.json
        run: |
          BODY=$(jq -r '.candidates[0].content.parts[0].text' result.json)
          echo "BODY<<EOF" >> $GITHUB_ENV
          echo "$BODY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # ✅ 抽出した BODY を PR にコメント投稿（curlのみ）
      - name: Post Gemini result to PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BODY: ${{ env.BODY }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
            -d "$(jq -n --arg body "$BODY" '{body: $body}')"
