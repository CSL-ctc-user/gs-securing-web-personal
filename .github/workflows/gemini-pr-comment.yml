name: Gemini PR Comment

on:
  pull_request:
    types: [opened]
  workflow_dispatch:

# ★重要：GITHUB_TOKEN の権限を明示（PRにコメント投稿するため）
permissions:
  contents: read
  pull-requests: write

jobs:
  gemini:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show trigger context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "actor=${{ github.actor }}"
          echo "repository=${{ github.repository }}"

      - name: Show PR info (if pull_request)
        if: github.event_name == 'pull_request'
        run: |
          echo "PR number=${{ github.event.pull_request.number }}"
          echo "PR title=${{ github.event.pull_request.title }}"
          echo "PR author=${{ github.event.pull_request.user.login }}"

      - name: Show manual dispatch info
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Manually triggered workflow"

      - name: Placeholder for Gemini processing
        run: |
          echo "Here we will call Gemini API later"

      # ★追加：PR にコメントする（PRはIssue扱いなので issue comments API）
      - name: Post comment to PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
            -d "$(jq -n --arg body '✅ Gemini PR Comment workflow is working!' '{body: $body}')"
