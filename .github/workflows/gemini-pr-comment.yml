name: Gemini PR Comment

on:
  pull_request:
    types: [opened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to comment on (required for workflow_dispatch)"
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  gemini:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure jq is available
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi
          jq --version

      - name: Show trigger context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "actor=${{ github.actor }}"
          echo "repository=${{ github.repository }}"

      - name: Show PR info (if pull_request)
        if: github.event_name == 'pull_request'
        run: |
          echo "PR number=${{ github.event.pull_request.number }}"
          echo "PR title=${{ github.event.pull_request.title }}"
          echo "PR author=${{ github.event.pull_request.user.login }}"

      # --- TODO: ここで Gemini API/CLI を呼んで result.json を生成する ---
      - name: Placeholder for Gemini processing
        run: |
          echo "TODO: Generate result.json here (Gemini API/CLI call)"

      - name: Verify result.json exists
        run: |
          if [ ! -f result.json ]; then
            echo "::error::result.json not found. Generate it in the Gemini step."
            echo "Current dir:"
            pwd
            echo "Files:"
            ls -la
            exit 1
          fi

      - name: Extract BODY from result.json
        run: |
          BODY="$(jq -r '.candidates[0].content.parts[0].text // empty' result.json)"

          if [ -z "$BODY" ] || [ "$BODY" = "null" ]; then
            echo "::error::BODY is empty or null. Check result.json structure."
            echo "---- result.json (first 2000 chars) ----"
            head -c 2000 result.json || true
            echo
            exit 1
          fi

          # 複数行対応でGITHUB_ENVへ格納
          {
            echo "BODY<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Determine PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            PR_IN="${{ inputs.pr_number }}"
            if [ -n "$PR_IN" ]; then
              echo "number=$PR_IN" >> "$GITHUB_OUTPUT"
            else
              echo "number=" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Post Gemini result to PR (GitHub REST API)
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          BODY: ${{ env.BODY }}
        run: |
          echo "Posting comment to PR #$PR_NUMBER on $REPO"

          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
            -d "$(jq -n --arg body "$BODY" '{body: $body}')"

      - name: Skip notice (no PR number)
        if: steps.pr.outputs.number == ''
        run: |
          echo "No PR number available."
          echo "If you used workflow_dispatch, set inputs.pr_number."

