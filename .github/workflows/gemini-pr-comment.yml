name: Gemini PR Comment

on:
  pull_request:
    types: [opened]
  workflow_dispatch:

jobs:
  gemini:
    runs-on: ubuntu-latest

    steps:
      # 1. リポジトリをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. デバッグ用：どのイベントで起動されたかを確認
      - name: Show trigger context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "actor=${{ github.actor }}"
          echo "repository=${{ github.repository }}"

      # 3. PR 情報の確認（PRトリガー時のみ）
      - name: Show PR info (if pull_request)
        if: github.event_name == 'pull_request'
        run: |
          echo "PR number=${{ github.event.pull_request.number }}"
          echo "PR title=${{ github.event.pull_request.title }}"
          echo "PR author=${{ github.event.pull_request.user.login }}"

      # 4. 手動実行時の確認
      - name: Show manual dispatch info
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Manually triggered workflow"

      # 5. （ダミー）Gemini 処理の代わり
      - name: Placeholder for Gemini processing
        run: |
          echo "Here we will call Gemini API later"
