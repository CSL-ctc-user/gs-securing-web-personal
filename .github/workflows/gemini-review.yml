name: '🧪 Gemini Review'

on:
  workflow_call:
    inputs:
      additional_context:
        required: false
        type: string
      issue_number:
        required: true
        type: string

defaults:
  run:
    shell: bash

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- TODO: ここでGeminiレビューを実行して返信文を生成 ---
      - name: Placeholder (review)
        run: |
          echo "TODO: run Gemini review here"
          {
            echo "REPLY<<EOF"
            echo "Gemini review placeholder: ${{ inputs.additional_context }}"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Post review comment (PAT)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_ACTIONS }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          REPOSITORY: ${{ github.repository }}
          BODY: ${{ env.REPLY }}
        run: |
          if [ -z "$BODY" ]; then
            echo "::error::REPLY(BODY) is empty"
            exit 1
          fi

          gh issue comment "${ISSUE_NUMBER}" \
            --body "${BODY}" \
            --repo "${REPOSITORY}"
