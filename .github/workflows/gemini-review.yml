name: '🧪 Gemini Review'

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: string
      additional_context:
        required: false
        type: string

defaults:
  run:
    shell: bash

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Prepare dirs
        run: mkdir -p "$RUNNER_TEMP/gemini"

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Build context file
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_ACTIONS }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          set -euo pipefail
          CONTEXT_FILE="$RUNNER_TEMP/gemini/context.txt"
          pr="$(gh api "repos/${REPO}/pulls/${ISSUE_NUMBER}")"
          title="$(echo "$pr" | jq -r '.title // ""')"
          url="$(echo "$pr" | jq -r '.html_url // ""')"
          base="$(echo "$pr" | jq -r '.base.ref // ""')"
          head="$(echo "$pr" | jq -r '.head.ref // ""')"
          diff="$(gh api -H 'Accept: application/vnd.github.v3.diff' \
            "repos/${REPO}/pulls/${ISSUE_NUMBER}" | head -c 200000)"
          {
            echo "PR Review: #${ISSUE_NUMBER}"
            echo "Title: ${title}"
            echo "URL: ${url}"
            echo "Base: ${base}"
            echo "Head: ${head}"
            echo ""
            echo "Additional context:"
            echo "${{ inputs.additional_context }}"
            echo ""
            echo "Diff (truncated):"
            echo "${diff}"
          } > "$CONTEXT_FILE"
          echo "CONTEXT_FILE=$CONTEXT_FILE" >> "$GITHUB_ENV"

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli@latest

      - name: Run Gemini (Flash)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/gemini/out.txt"
          ERR="$RUNNER_TEMP/gemini/err.txt"
          set +e
          printf "%s\n" \
            "You are Gemini CLI running in GitHub Actions." \
            "Perform a pull request review." \
            "Provide: summary, risks, suggestions." \
            "Output only final comment body." \
            "" "CONTEXT:" \
            | cat - "$CONTEXT_FILE" \
            | gemini --model gemini-1.5-flash --prompt - >"$OUT" 2>"$ERR"
          rc=$?
          set -e
          echo "RC=$rc" >> "$GITHUB_ENV"
          echo "OUT=$OUT" >> "$GITHUB_ENV"
          echo "ERR=$ERR" >> "$GITHUB_ENV"

      - name: Post comment
        if: ${{ always() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_ACTIONS }}
        run: |
          BODY="$RUNNER_TEMP/gemini/body.txt"
          if [ "${RC:-1}" = "0" ] && [ -s "${OUT:-}" ]; then
            cp "$OUT" "$BODY"
          else
            printf "❌ Gemini failed.\n\n%s\n" "$(cat "${ERR:-/dev/null}" 2>/dev/null || true)" > "$BODY"
          fi
          gh issue comment "${{ inputs.issue_number }}" --body-file "$BODY" --repo "${{ github.repository }}"
