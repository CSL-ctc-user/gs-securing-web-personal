name: '🏷️ Gemini Triage'

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: string
      additional_context:
        required: false
        type: string

defaults:
  run:
    shell: bash

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Prepare dirs
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/gemini"

      - name: Install deps (jq)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Fetch issue context
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_ACTIONS }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          set -euo pipefail

          CONTEXT_FILE="$RUNNER_TEMP/gemini/context.txt"

          issue="$(gh api "repos/${REPO}/issues/${ISSUE_NUMBER}")"
          title="$(echo "$issue" | jq -r '.title // ""')"
          body="$(echo "$issue" | jq -r '.body // ""')"
          url="$(echo "$issue" | jq -r '.html_url // ""')"

          {
            echo "Issue: #${ISSUE_NUMBER}"
            echo "Title: ${title}"
            echo "URL: ${url}"
            echo ""
            echo "Additional context:"
            echo "${{ inputs.additional_context }}"
            echo ""
            echo "Body:"
            echo "${body}"
          } > "$CONTEXT_FILE"

          echo "CONTEXT_FILE=$CONTEXT_FILE" >> "$GITHUB_ENV"

      - name: Install Gemini CLI
        run: |
          npm install -g @google/gemini-cli@latest
          gemini --version

      - name: Run Gemini CLI (triage / Flash fixed)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail

          OUT_FILE="$RUNNER_TEMP/gemini/out.txt"
          ERR_FILE="$RUNNER_TEMP/gemini/err.txt"

          set +e
          printf "%s\n" \
            "You are Gemini CLI running in GitHub Actions." \
            "Perform issue triage." \
            "" \
            "Provide:" \
            "- Suggested labels" \
            "- Priority" \
            "- Recommended next actions" \
            "" \
            "Output only the final comment body text." \
            "" \
            "CONTEXT:" \
            | cat - "$CONTEXT_FILE" \
            | gemini --model gemini-1.5-flash --prompt - \
              >"$OUT_FILE" 2>"$ERR_FILE"
          rc=$?
          set -e

          echo "RC=$rc" >> "$GITHUB_ENV"
          echo "OUT_FILE=$OUT_FILE" >> "$GITHUB_ENV"
          echo "ERR_FILE=$ERR_FILE" >> "$GITHUB_ENV"

      - name: Post triage comment
        if: ${{ env.RC == '0' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_ACTIONS }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh issue comment "${ISSUE_NUMBER}" \
            --body-file "$OUT_FILE" \
            --repo "${REPOSITORY}"
