name: '🧪 Gemini Review'

on:
  workflow_call:
    inputs:
      additional_context:
        required: false
        type: string
      issue_number:
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.issue_number }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare dirs
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.gemini" "$RUNNER_TEMP/gemini"

      - name: Install deps (jq)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Fetch PR diff (PAT)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_ACTIONS }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          set -euo pipefail

          DELIM="CTX_$(date +%s%N)_$RANDOM"

          pr="$(gh api "repos/${REPO}/pulls/${ISSUE_NUMBER}")"
          title="$(echo "$pr" | jq -r '.title // ""')"
          url="$(echo "$pr" | jq -r '.html_url // ""')"
          base="$(echo "$pr" | jq -r '.base.ref // ""')"
          head="$(echo "$pr" | jq -r '.head.ref // ""')"
          diff="$(gh api -H 'Accept: application/vnd.github.v3.diff' "repos/${REPO}/pulls/${ISSUE_NUMBER}" | head -c 200000)"

          {
            echo "CONTEXT<<${DELIM}"
            echo "PR Review: #${ISSUE_NUMBER}"
            echo "Title: ${title}"
            echo "URL: ${url}"
            echo "Base: ${base}"
            echo "Head: ${head}"
            echo ""
            echo "Additional context:"
            echo "${{ inputs.additional_context }}"
            echo ""
            echo "Diff (truncated):"
            echo "${diff}"
            echo "${DELIM}"
          } >> "$GITHUB_ENV"

      - name: Install Gemini CLI
        run: |
          set -euo pipefail
          npm install -g @google/gemini-cli@latest
          gemini --version

      - name: Run Gemini CLI (review / Flash fixed)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail

          OUT_FILE="$RUNNER_TEMP/gemini/out.txt"
          ERR_FILE="$RUNNER_TEMP/gemini/err.txt"

          PROMPT="You are Gemini CLI running in GitHub Actions.
Perform a pull request review.

Provide:
1) Summary of changes
2) Potential risks (security, correctness, maintainability)
3) Concrete suggestions (with file/line references when possible)

Keep it concise and actionable.
Output only the final comment body text (no markdown fences)."

          set +e
          printf "%s\n\nCONTEXT:\n%s\n" "$PROMPT" "${CONTEXT}" \
            | gemini --model gemini-1.5-flash --prompt - \
              >"$OUT_FILE" 2>"$ERR_FILE"
          rc=$?
          set -e

          echo "RC=$rc" >> "$GITHUB_ENV"
          echo "OUT_FILE=$OUT_FILE" >> "$GITHUB_ENV"
          echo "ERR_FILE=$ERR_FILE" >> "$GITHUB_ENV"

      - name: Post review comment (PAT)
        if: ${{ always() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_ACTIONS }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          BODY_FILE="$RUNNER_TEMP/gemini/body.txt"

          if [ "${RC:-1}" = "0" ] && [ -s "${OUT_FILE:-}" ]; then
            cp "$OUT_FILE" "$BODY_FILE"
          else
            err="$(cat "${ERR_FILE:-/dev/null}" 2>/dev/null || true)"
            printf "❌ Gemini の実行に失敗しました。\n\n%s\n" "$err" > "$BODY_FILE"
          fi

          gh issue comment "${ISSUE_NUMBER}" \
            --body-file "$BODY_FILE" \
            --repo "${REPOSITORY}"
