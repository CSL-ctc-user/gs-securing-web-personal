name: '✨ Gemini Invoke'

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: string
      additional_context:
        required: false
        type: string

defaults:
  run:
    shell: bash

jobs:
  invoke:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Prepare dirs
        run: mkdir -p "$RUNNER_TEMP/gemini"

      - name: Build context file
        run: |
          CONTEXT_FILE="$RUNNER_TEMP/gemini/context.txt"
          {
            echo "Invoke request for issue #${{ inputs.issue_number }}"
            echo ""
            echo "Additional context:"
            echo "${{ inputs.additional_context }}"
          } > "$CONTEXT_FILE"
          echo "CONTEXT_FILE=$CONTEXT_FILE" >> "$GITHUB_ENV"

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli@latest

      - name: Run Gemini (Flash)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          OUT="$RUNNER_TEMP/gemini/out.txt"
          printf "%s\n" "Respond to the request." "" "CONTEXT:" \
            | cat - "$CONTEXT_FILE" \
            | gemini --model gemini-1.5-flash --prompt - >"$OUT" 2>/dev/null
          echo "OUT=$OUT" >> "$GITHUB_ENV"

      - name: Post comment
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_ACTIONS }}
        run: |
          gh issue comment "${{ inputs.issue_number }}" --body-file "$OUT" --repo "${{ github.repository }}"
