name: '✨ Gemini Invoke'

on:
  workflow_call:
    inputs:
      additional_context:
        required: false
        type: string
      issue_number:
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.issue_number }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  invoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Gemini CLI dirs
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.gemini" "$GITHUB_WORKSPACE/.gemini"

      - name: Fetch PR diff / Issue body (PAT)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_ACTIONS }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          set -euo pipefail

          DELIM="CTX_$(date +%s%N)_$RANDOM"

          # Try PR first
          if gh api "repos/${REPO}/pulls/${ISSUE_NUMBER}" >/tmp/pr.json 2>/dev/null; then
            title="$(jq -r '.title // ""' /tmp/pr.json)"
            url="$(jq -r '.html_url // ""' /tmp/pr.json)"
            base="$(jq -r '.base.ref // ""' /tmp/pr.json)"
            head="$(jq -r '.head.ref // ""' /tmp/pr.json)"

            # Diff can be huge -> cap to reduce tokens/quota usage
            diff="$(gh api -H 'Accept: application/vnd.github.v3.diff' "repos/${REPO}/pulls/${ISSUE_NUMBER}" | head -c 200000)"

            {
              echo "CONTEXT<<${DELIM}"
              echo "PR: #${ISSUE_NUMBER}"
              echo "Title: ${title}"
              echo "URL: ${url}"
              echo "Base: ${base}"
              echo "Head: ${head}"
              echo ""
              echo "User request:"
              echo "${{ inputs.additional_context }}"
              echo ""
              echo "Diff (truncated):"
              echo "${diff}"
              echo "${DELIM}"
            } >> "$GITHUB_ENV"
          else
            issue="$(gh api "repos/${REPO}/issues/${ISSUE_NUMBER}")"
            title="$(echo "$issue" | jq -r '.title // ""')"
            body="$(echo "$issue" | jq -r '.body // ""' | head -c 200000)"
            url="$(echo "$issue" | jq -r '.html_url // ""')"

            {
              echo "CONTEXT<<${DELIM}"
              echo "Issue: #${ISSUE_NUMBER}"
              echo "Title: ${title}"
              echo "URL: ${url}"
              echo ""
              echo "User request:"
              echo "${{ inputs.additional_context }}"
              echo ""
              echo "Body (truncated):"
              echo "${body}"
              echo "${DELIM}"
            } >> "$GITHUB_ENV"
          fi

      - name: Run Gemini (invoke)
        id: gemini
        uses: google-github-actions/run-gemini-cli@v0
        env:
          # Do NOT pass GitHub auth into Gemini step
          GITHUB_TOKEN: ''
        with:
          # --- Google auth: API key ---
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}

          # (推奨) latest固定は避ける。必要なら repo variable で pin
          gemini_cli_version: ${{ vars.GEMINI_CLI_VERSION }}

          gemini_debug: ${{ fromJSON(vars.GEMINI_DEBUG || vars.ACTIONS_STEP_DEBUG || 'false') }}
          gemini_model: ${{ vars.GEMINI_MODEL }}

          # Optional (Vertex AI / GCA を使うなら)
          google_api_key: ${{ secrets.GOOGLE_API_KEY }}
          use_gemini_code_assist: ${{ vars.GOOGLE_GENAI_USE_GCA }}
          use_vertex_ai: ${{ vars.GOOGLE_GENAI_USE_VERTEXAI }}
          gcp_location: ${{ vars.GOOGLE_CLOUD_LOCATION }}
          gcp_project_id: ${{ vars.GOOGLE_CLOUD_PROJECT }}
          gcp_service_account: ${{ vars.SERVICE_ACCOUNT_EMAIL }}
          gcp_workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}

          upload_artifacts: ${{ vars.UPLOAD_ARTIFACTS }}
          workflow_name: 'gemini-invoke'

          prompt: |-
            You are Gemini CLI running in GitHub Actions.
            Always return a helpful response.
            If CONTEXT includes a PR diff, summarize changes, risks, and suggestions.
            If CONTEXT includes an issue, propose next steps.
            Output only the final comment body text.

            CONTEXT:
            ${{
              env.CONTEXT
            }}

      - name: Post reply comment (PAT) (always)
        if: ${{ always() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_ACTIONS }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          REPOSITORY: ${{ github.repository }}
          OK_BODY: ${{ steps.gemini.outputs.summary }}
          ERR_BODY: ${{ steps.gemini.outputs.error }}
        run: |
          set -euo pipefail

          if [ -n "${OK_BODY}" ]; then
            body="${OK_BODY}"
          else
            # 429/認証エラー等でもPRに原因が見えるように返す
            body="❌ Gemini の呼び出しに失敗しました。\n\n${ERR_BODY}"
          fi

          gh issue comment "${ISSUE_NUMBER}" \
            --body "${body}" \
            --repo "${REPOSITORY}"
