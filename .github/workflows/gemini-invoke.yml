name: '✨ Gemini Invoke'

on:
  workflow_call:
    inputs:
      additional_context:
        required: false
        type: string
      issue_number:
        required: true
        type: string

defaults:
  run:
    shell: bash

jobs:
  invoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- TODO: ここで Gemini を実行して返信文を作る（result.json 等） ---
      - name: Placeholder (invoke)
        run: |
          echo "TODO: run Gemini invoke here"
          {
            echo "REPLY<<EOF"
            echo "Gemini invoke placeholder: ${{ inputs.additional_context }}"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Post reply comment (PAT)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_ACTIONS }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          REPOSITORY: ${{ github.repository }}
          BODY: ${{ env.REPLY }}
        run: |
          if [ -z "$BODY" ]; then
            echo "::error::REPLY(BODY) is empty"
            exit 1
          fi

          gh issue comment "${ISSUE_NUMBER}" \
            --body "${BODY}" \
            --repo "${REPOSITORY}"
